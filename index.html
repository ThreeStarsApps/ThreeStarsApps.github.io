<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreeStars Apps</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="assets/css/bootstrap-5.3.8.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-5">ThreeStars Apps</h1>
    <div class="row justify-content-center g-4">
        <!-- PenStar App Card -->
        <div class="col-12 col-md-6 col-lg-5">
            <div class="app-card">
                <img src="assets/images/PenStar.png" alt="PenStar Icon" class="app-icon">
                <h2 class="app-title">PenStar</h2>
                <p class="app-description">Remap Bluetooth S Pen gestures to any action for any app.</p>
                <div class="d-flex justify-content-center gap-3 mt-auto pt-3">
                    <a href="https://play.google.com/store/apps/details?id=com.threestars.penstar"
                       class="btn btn-icon" target="_blank" title="Google Play Store">
                        <i class="bi bi-google-play"></i>
                    </a>
                    <a href="assets/apks/PenStar 1.8.apk" class="btn btn-icon" download title="Download APK">
                        <i class="bi bi-download"></i>
                    </a>
                    <a href="penstar/privacy_policy.html" class="btn btn-icon" title="Privacy Policy">
                        <i class="bi bi-shield-check"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- KeyStar App Card -->
        <div class="col-12 col-md-6 col-lg-5">
            <div class="app-card">
                <img src="assets/images/KeyStar.png" alt="KeyStar Icon" class="app-icon">
                <h2 class="app-title">KeyStar</h2>
                <p class="app-description">Remap and fully control the buttons on your Samsung device.</p>
                <div class="d-flex justify-content-center gap-3 mt-auto pt-3">
                    <a href="https://play.google.com/store/apps/details?id=com.threestars.keystar"
                       class="btn btn-icon" target="_blank" title="Google Play Store">
                        <i class="bi bi-google-play"></i>
                    </a>
                    <a href="assets/apks/KeyStar 1.0.apk" class="btn btn-icon" download title="Download APK">
                        <i class="bi bi-download"></i>
                    </a>
                    <a href="keystar/privacy_policy.html" class="btn btn-icon" title="Privacy Policy">
                        <i class="bi bi-shield-check"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="assets/js/bootstrap-5.3.8.js"></script>
</body>
</html>
